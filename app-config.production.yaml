app:
  title: Homelab Backstage
  baseUrl: http://localhost:7007

backend:
  baseUrl: http://localhost:7007
  listen:
    port: 7007
  database:
    client: pg
    connection:
      host: backstage-db-rw.backstage.svc.cluster.local
      port: 5432
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
      database: ${POSTGRES_DB}
  auth:
    keys:
      - secret: ${BACKEND_SECRET}

kubernetes:
  serviceLocatorMethod:
    type: multiTenant
  clusterLocatorMethods:
    - type: config
      clusters:
        - name: homelab
          url: https://kubernetes.default.svc
          authProvider: serviceAccount
          skipTLSVerify: false
          skipMetricsLookup: true
          customResources:
            - group: postgresql.cnpg.io
              apiVersion: v1
              plural: clusters
            - group: platform.rizaes.com
              apiVersion: v1alpha1
              plural: webapps

integrations:
  github:
    - host: github.com
      token: ${GITHUB_TOKEN}

catalog:
  rules:
    - allow: [Component, Group, Location, User]
  locations:
    - type: url
      target: https://raw.githubusercontent.com/RizaSatya/homelab/main/platform/control-plane/backstage/catalog/root.yaml

argocd:
  username: backstage
  password: ${ARGOCD_AUTH_TOKEN}
  baseUrl: https://argocd-server.argocd.svc.cluster.local